services:
  - type: web
    name: guardpilot
    runtime: python
    plan: free
    autoDeployTrigger: commit
    buildCommand: python -m pip install -e guardpilot/apps/api
    startCommand: uvicorn guardpilot.main:app --app-dir guardpilot/apps/api --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GUARDPILOT_DB_PATH
        value: /opt/render/project/src/guardpilot/guardpilot.db
      - key: GUARDPILOT_LOG_DIR
        value: /opt/render/project/src/guardpilot/samples/outputs
